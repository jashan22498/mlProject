<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeneClust - Hierarchical Clustering Explorer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">Spellman Dataset: Hierarchical Clustering</span>
        </div>
    </nav>

    <div class="container">
        <div class="row mb-4">
            <div class="col-md-3">
                <div class="card p-3 shadow-sm">
                    <h5>Controls</h5>
                    <label class="form-label mt-2">Linkage Method</label>
                    <select id="method" class="form-select">
                        <option value="ward">Ward</option>
                        <option value="complete">Complete</option>
                        <option value="average">Average</option>
                        <option value="single">Single</option>
                    </select>
                    
                    <label class="form-label mt-3">Number of Clusters ($k$)</label>
                    <input type="number" id="clusters" class="form-control" value="5" min="2" max="20">
                    
                    <button class="btn btn-primary mt-4 w-100" onclick="runClustering()">Run Clustering</button>
                </div>
            </div>
            <div class="col-md-9">
                <div class="card shadow-sm p-3">
                    <h5>Hierarchical Dendrogram (Truncated Top Nodes)</h5>
                    <div id="dendro-plot" style="height: 400px;"></div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6 mb-4">
                <div class="card shadow-sm p-3">
                    <h5>PCA Cluster Visualization</h5>
                    <div id="pca-plot" style="height: 450px;"></div>
                </div>
            </div>
            <div class="col-md-6 mb-4">
                <div class="card shadow-sm p-3">
                    <h5>Mean Cluster Expression Profiles</h5>
                    <div id="profile-plot" style="height: 450px;"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/script.js"></script>
</body>
</html>
